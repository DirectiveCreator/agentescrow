<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="stepGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="workGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <linearGradient id="verifyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="failGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
    <filter id="sh2">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
    <marker id="arr2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="520" rx="12" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="350" y="38" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="600">Escrow Flow</text>

  <!-- Step 1: Post Task -->
  <rect x="200" y="60" width="300" height="50" rx="10" fill="url(#stepGrad)" filter="url(#sh2)"/>
  <text x="220" y="82" fill="white" font-size="13" font-weight="700">1</text>
  <text x="245" y="82" fill="white" font-size="14" font-weight="500">Buyer posts task + 0.001 ETH</text>
  <text x="350" y="100" text-anchor="middle" fill="#c7d2fe" font-size="11">ServiceBoard.postTask()</text>

  <!-- Arrow -->
  <line x1="350" y1="110" x2="350" y2="140" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Step 2: Lock -->
  <rect x="200" y="145" width="300" height="50" rx="10" fill="url(#lockGrad)" filter="url(#sh2)"/>
  <text x="220" y="167" fill="#1e293b" font-size="13" font-weight="700">2</text>
  <text x="245" y="167" fill="#1e293b" font-size="14" font-weight="500">ETH locked in EscrowVault</text>
  <text x="350" y="185" text-anchor="middle" fill="#78350f" font-size="11">Funds held trustlessly</text>

  <!-- Arrow -->
  <line x1="350" y1="195" x2="350" y2="225" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Step 3: Claim + Work + Deliver -->
  <rect x="200" y="230" width="300" height="65" rx="10" fill="url(#workGrad)" filter="url(#sh2)"/>
  <text x="220" y="255" fill="white" font-size="13" font-weight="700">3</text>
  <text x="245" y="255" fill="white" font-size="14" font-weight="500">Seller claims → executes → delivers</text>
  <text x="350" y="278" text-anchor="middle" fill="#e0f2fe" font-size="11">claim() → work off-chain → deliver(hash)</text>

  <!-- Arrow -->
  <line x1="350" y1="295" x2="350" y2="325" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Step 4: Verify -->
  <rect x="200" y="330" width="300" height="50" rx="10" fill="url(#verifyGrad)" filter="url(#sh2)"/>
  <text x="220" y="352" fill="white" font-size="13" font-weight="700">4</text>
  <text x="245" y="352" fill="white" font-size="14" font-weight="500">Buyer verifies delivery</text>
  <text x="350" y="370" text-anchor="middle" fill="#ddd6fe" font-size="11">confirmDelivery()</text>

  <!-- Branch arrows -->
  <line x1="300" y1="380" x2="200" y2="420" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr2)"/>
  <line x1="400" y1="380" x2="500" y2="420" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Confirmed -->
  <rect x="80" y="425" width="250" height="55" rx="10" fill="url(#successGrad)" filter="url(#sh2)"/>
  <text x="120" y="448" fill="white" font-size="13" font-weight="700">✓ Confirmed</text>
  <text x="205" y="448" fill="white" font-size="14" font-weight="500">→ ETH to Seller</text>
  <text x="205" y="468" text-anchor="middle" fill="#d1fae5" font-size="11">Reputation updated on-chain</text>

  <!-- Timeout -->
  <rect x="380" y="425" width="250" height="55" rx="10" fill="url(#failGrad)" filter="url(#sh2)"/>
  <text x="420" y="448" fill="white" font-size="13" font-weight="700">✕ Timeout</text>
  <text x="505" y="448" fill="white" font-size="14" font-weight="500">→ ETH to Buyer</text>
  <text x="505" y="468" text-anchor="middle" fill="#fee2e2" font-size="11">Refund via EscrowVault</text>
</svg>